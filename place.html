<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Plans</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
}

/* Header */
header {
    background: linear-gradient(120deg, #4facfe, #00f2fe);
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 24px;
}

/* Container */
.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* Cards */
.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card h3 {
    margin: 0;
}

.price {
    color: #4facfe;
    font-weight: bold;
}

button {
    margin-top: 10px;
    padding: 8px;
    border: none;
    background: #4facfe;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #00c6ff;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    animation: zoom 0.4s ease;
}

@keyframes zoom {
    from {transform: scale(0.7);}
    to {transform: scale(1);}
}

.close {
    float: right;
    cursor: pointer;
    color: red;
}
</style>
</head>

<body>

<header>🌍 Travel Plans & Packages</header>

<div class="container">

    <!-- Card 1 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34">
        <div class="card-content">
            <h3>Paris</h3>
            <p class="price">₹80,000</p>
            <button onclick="showDetails('Paris', '5 Days, Hotel, Food, Sightseeing')">View Details</button>
        </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
        <div class="card-content">
            <h3>Maldives</h3>
            <p class="price">₹1,20,000</p>
            <button onclick="showDetails('Maldives', '4 Days, Resort Stay, Water Activities')">View Details</button>
        </div>
    </div>

    <!-- Card 3 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1490578474895-699cd4e2cf59">
        <div class="card-content">
            <h3>New York</h3>
            <p class="price">₹95,000</p>
            <button onclick="showDetails('New York', '6 Days, Hotel, City Tour')">View Details</button>
        </div>
    </div>

    <!-- Card 4 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1549692520-acc6669e2f0c">
        <div class="card-content">
            <h3>Tokyo</h3>
            <p class="price">₹1,10,000</p>
            <button onclick="showDetails('Tokyo', '5 Days, Hotel, Cultural Tour')">View Details</button>
        </div>
    </div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <h3 id="title"></h3>
        <p id="details"></p>
    </div>
</div>

<script>
function showDetails(place, info) {
    document.getElementById("title").innerText = place;
    document.getElementById("details").innerText = info;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
