<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Website Login</title>
<style>
/* General Styling */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url('https://images.unsplash.com/photo-1526772662000-3f88f10405ff?auto=format&fit=crop&w=1470&q=80') no-repeat center center/cover;
    position: relative;
    overflow: hidden;
}

/* Floating shapes */
.floating-shapes span {
    position: absolute;
    width: 25px;
    height: 25px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    animation: float 12s linear infinite;
}
.floating-shapes span:nth-child(1) { left: 10%; animation-delay: 0s; }
.floating-shapes span:nth-child(2) { left: 30%; animation-delay: 3s; }
.floating-shapes span:nth-child(3) { left: 50%; animation-delay: 6s; }
.floating-shapes span:nth-child(4) { left: 70%; animation-delay: 9s; }
.floating-shapes span:nth-child(5) { left: 90%; animation-delay: 12s; }

@keyframes float {
    0% { transform: translateY(100vh) scale(1); opacity: 0.6; }
    50% { opacity: 0.8; }
    100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
}

/* Login Box */
.login-container {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
    position: relative;
}

.login-box {
    background: rgba(255, 255, 255, 0.95);
    padding: 70px 60px;
    border-radius: 30px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
    width: 500px;
    max-width: 90%;
    min-height: 600px;
    text-align: center;
    transform: translateY(-50px);
    animation: slideFadeIn 1s forwards;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Hover effect for box */
.login-box:hover {
    transform: translateY(-50px) scale(1.03);
    box-shadow: 0 35px 90px rgba(0,0,0,0.6);
}

@keyframes slideFadeIn {
    0% { opacity: 0; transform: translateY(-50px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* Title */
.login-box h2.title {
    margin-bottom: 40px;
    color: #ff6b6b;
    font-size: 32px;
    animation: titleBounce 1s ease-in-out;
}

@keyframes titleBounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
}

/* Input Fields */
.input-group {
    margin-bottom: 25px;
    text-align: left;
}

.input-group label {
    display: block;
    margin-bottom: 8px;
    color: #555;
    font-weight: bold;
    font-size: 18px;
}

.input-group input {
    width: 100%;
    padding: 18px;
    border: 1px solid #ddd;
    border-radius: 14px;
    font-size: 18px;
    transition: all 0.3s ease;
}

/* Hover + focus effect for inputs */
.input-group input:hover {
    border-color: #ff8e53;
    box-shadow: 0 0 10px rgba(255, 140, 83, 0.5);
}

.input-group input:focus {
    border-color: #ff6b6b;
    box-shadow: 0 0 12px rgba(255, 107, 107, 0.7);
    outline: none;
}

/* Button Styling */
button.btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(45deg, #ff6b6b, #ff8e53);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.3s ease, transform 0.3s ease;
    box-shadow: 0 10px 25px rgba(255,107,107,0.4);
}

/* Hover effect for button */
button.btn:hover {
    transform: scale(1.07) translateY(-2px);
    box-shadow: 0 14px 35px rgba(255,107,107,0.7);
}

/* Error Message */
.error-msg {
    color: red;
    margin-top: 12px;
    font-size: 16px;
    min-height: 20px;
    transition: all 0.3s ease;
}

/* Signup Link */
.signup-link {
    margin-top: 18px;
    font-size: 16px;
}

.signup-link a {
    color: #ff6b6b;
    text-decoration: none;
    transition: all 0.3s ease;
}

.signup-link a:hover {
    text-decoration: underline;
    color: #ff8e53;
}
</style>
</head>
<body>
<div class="login-container">
    <div class="floating-shapes">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="login-box">
        <h2 class="title">Welcome to Wanderlust Travel</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <p class="error-msg" id="error-msg"></p>
            <p class="signup-link">Don't have an account? <a href="#">Sign up</a></p>
        </form>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("error-msg");

    if(email === "" || password === "") {
        errorMsg.style.color = "red";
        errorMsg.textContent = "Please fill in all fields!";
        return;
    }

    if(email === "user@travel.com" && password === "wanderlust") {
        errorMsg.style.color = "green";
        errorMsg.textContent = "Login successful! Redirecting...";
        setTimeout(() => {
            window.location.href = "home.html";
        }, 1500);
    } else {
        errorMsg.style.color = "red";
        errorMsg.textContent = "Invalid email or password!";
    }
});
</script>
</body>
</html>
